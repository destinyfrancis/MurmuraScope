services:
  backend:
    image: ghcr.io/destinyfrancis/murmurascope-backend:latest
    pull_policy: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - murmuroscope-data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/murmuroscope.db
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    pids_limit: 100

  frontend:
    image: ghcr.io/destinyfrancis/murmurascope-frontend:latest
    pull_policy: always
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability stack — run with: docker compose --profile observability up -d
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    profiles:
      - observability
    restart: unless-stopped

volumes:
  murmuroscope-data:
    driver: local
