services:
  backend:
    volumes:
      - ./backend:/app/backend
      - murmuroscope-data:/app/data
    command: >
      uvicorn backend.run:app
      --host 0.0.0.0
      --port 5001
      --reload
      --reload-dir /app/backend
    environment:
      - DATABASE_PATH=/app/data/murmuroscope.db
      - DEBUG=true

  frontend:
    build:
      context: ./frontend
      target: builder
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend
